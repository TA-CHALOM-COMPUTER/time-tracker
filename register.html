<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="card shadow" style="max-width:420px;width:100%">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="display-4">⏱</div>
        <h4 class="fw-bold">สมัครสมาชิก</h4>
        <p class="text-muted small">Time Tracker — ระบบบันทึกเวลาและการลา</p>
      </div>

      <div id="alert-box" class="alert d-none mb-3"></div>

      <div class="mb-3">
        <label class="form-label fw-semibold">ชื่อ-นามสกุล</label>
        <input type="text" id="inp-name" class="form-control" placeholder="เช่น สมชาย ใจดี">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">อีเมล</label>
        <input type="email" id="inp-email" class="form-control" placeholder="user@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">รหัสผ่าน</label>
        <input type="password" id="inp-password" class="form-control" placeholder="อย่างน้อย 6 ตัวอักษร">
        <div class="form-text">รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">ยืนยันรหัสผ่าน</label>
        <input type="password" id="inp-confirm" class="form-control" placeholder="กรอกรหัสผ่านอีกครั้ง">
      </div>

      <button id="btn-register" class="btn btn-primary w-100 fw-bold mb-3">✅ สมัครสมาชิก</button>
      <div class="text-center">
        <small class="text-muted">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></small>
      </div>
    </div>
  </div>

  <script>
    // ถ้า login แล้วให้ redirect ออก
    redirectIfLoggedIn();

    document.getElementById("btn-register").addEventListener("click", async () => {
      const name     = document.getElementById("inp-name").value.trim();
      const email    = document.getElementById("inp-email").value.trim();
      const password = document.getElementById("inp-password").value;
      const confirm  = document.getElementById("inp-confirm").value;
      const alertBox = document.getElementById("alert-box");
      const btn      = document.getElementById("btn-register");

      // Validate
      alertBox.className = "alert d-none";
      if (!name) return showAlert("กรุณากรอกชื่อ-นามสกุล", "danger");
      if (!email) return showAlert("กรุณากรอกอีเมล", "danger");
      if (password.length < 6) return showAlert("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร", "danger");
      if (password !== confirm) return showAlert("รหัสผ่านไม่ตรงกัน", "danger");

      try {
        btn.disabled = true;
        btn.textContent = "กำลังสมัคร...";

        // สร้าง account ใน Firebase Auth
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;

        // บันทึกข้อมูลใน Realtime Database
        await db.ref(`users/${uid}`).set({
          name,
          email,
          role: "employee",
          created_at: Date.now()
        });

        // ตั้งโควต้าลาเริ่มต้น
        const settings = await getSettings();
        await db.ref(`leave_quotas/${uid}`).set({
          annual_used:   0,
          sick_used:     0,
          personal_used: 0
        });

        // ตั้ง timebank เริ่มต้น
        await db.ref(`timebank_balance/${uid}`).set(0);

        showAlert("สมัครสมาชิกสำเร็จ! กำลังเข้าสู่ระบบ...", "success");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = "✅ สมัครสมาชิก";

        // แปล error เป็นภาษาไทย
        const errMap = {
          "auth/email-already-in-use": "อีเมลนี้ถูกใช้งานแล้ว",
          "auth/invalid-email":        "รูปแบบอีเมลไม่ถูกต้อง",
          "auth/weak-password":        "รหัสผ่านไม่ปลอดภัยพอ",
        };
        showAlert(errMap[err.code] || "เกิดข้อผิดพลาด: " + err.message, "danger");
      }
    });

    function showAlert(msg, type) {
      const el = document.getElementById("alert-box");
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
