<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การลา — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-4">📅 บันทึกการลา</h4>

      <div class="row g-4">
        <!-- Form -->
        <div class="col-md-5">
          <div class="card">
            <div class="card-header fw-bold">ขอลาใหม่</div>
            <div class="card-body">
              <div id="lbl-quota" class="mb-3"></div>

              <div id="leave-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold">ประเภทการลา</label>
                  <select id="leave-type" class="form-select">
                    <option value="annual">ลาพักร้อน</option>
                    <option value="sick">ลาป่วย</option>
                    <option value="personal">ลากิจ</option>
                    <option value="comp">ใช้ชั่วโมงชดเชย</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">วันเริ่มต้น</label>
                  <input type="date" id="leave-start" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">วันสิ้นสุด <small class="text-muted">(ถ้าลาหลายวัน)</small></label>
                  <input type="date" id="leave-end" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">เหตุผล</label>
                  <textarea id="leave-reason" class="form-control" rows="3" placeholder="ระบุเหตุผล..."></textarea>
                </div>
                <button type="button" id="btn-leave-submit" class="btn btn-primary w-100 fw-bold">📥 บันทึกการลา</button>
              </div>
            </div>
          </div>
        </div>

        <!-- History -->
        <div class="col-md-7">
          <div class="card">
            <div class="card-header fw-bold">ประวัติการลา</div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                  <thead class="table-dark">
                    <tr><th>ประเภท</th><th>เริ่ม</th><th>สิ้นสุด</th><th>วัน</th><th>เหตุผล</th><th>สถานะ</th></tr>
                  </thead>
                  <tbody id="leave-history-body">
                    <tr><td colspan="6" class="text-center">กำลังโหลด...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-msg" class="alert d-none position-fixed bottom-0 end-0 m-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });

    // Wire up submit button to form
    document.getElementById("btn-leave-submit").addEventListener("click", () => {
      document.getElementById("leave-form").dispatchEvent(new Event("submit"));
    });
    document.getElementById("leave-form").addEventListener("submit", e => e.preventDefault());
  </script>
  <script src="assets/js/leave.js"></script>
</body>
</html>
