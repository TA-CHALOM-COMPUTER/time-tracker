<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกเวลา — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-1">📋 บันทึกเวลาเข้า-ออก</h4>
      <p class="text-muted" id="lbl-date">—</p>

      <!-- สถานะวันนี้ -->
      <div class="card mb-4">
        <div class="card-body">
          <div id="lbl-sat-info" class="mb-2 d-none badge fs-6"></div>
          <div class="mb-3" id="lbl-status">กำลังโหลด...</div>
          <div class="d-flex gap-2">
            <button id="btn-checkin"  class="btn btn-success btn-lg px-4" disabled>✅ Check-In</button>
            <button id="btn-checkout" class="btn btn-danger btn-lg px-4"  disabled>🚪 Check-Out</button>
          </div>
        </div>
      </div>

      <!-- ประวัติ 30 วัน -->
      <div class="card">
        <div class="card-header fw-bold">ประวัติ 30 วันล่าสุด</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-striped mb-0">
              <thead class="table-dark">
                <tr>
                  <th>วันที่</th><th>เวลาเข้า</th><th>เวลาออก</th>
                  <th>ชั่วโมงทำงาน</th><th>ชดเชย</th>
                </tr>
              </thead>
              <tbody id="attendance-table-body">
                <tr><td colspan="5" class="text-center">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-msg" class="alert d-none position-fixed bottom-0 end-0 m-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });
  </script>
  <script src="assets/js/attendance.js"></script>
</body>
</html>
