<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงาน — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-4">📊 รายงานรายเดือน</h4>

      <div class="card mb-4">
        <div class="card-body d-flex align-items-end gap-3 flex-wrap">
          <div>
            <label class="form-label fw-semibold">เลือกเดือน</label>
            <input type="month" id="sel-month" class="form-control">
          </div>
          <button id="btn-generate" class="btn btn-primary fw-bold">📊 สร้างรายงาน</button>
        </div>
      </div>

      <div id="report-content"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });
  </script>
  <script src="assets/js/report.js"></script>
</body>
</html>
