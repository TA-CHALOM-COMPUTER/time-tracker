<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-1">🏠 Dashboard</h4>
      <p class="text-muted">สวัสดี, <strong id="lbl-username">—</strong></p>

      <!-- วันนี้ -->
      <div class="card mb-4 border-primary">
        <div class="card-header bg-primary text-white fw-bold">📋 วันนี้</div>
        <div class="card-body d-flex gap-4 flex-wrap">
          <div><small class="text-muted">เวลาเข้า</small><br><span class="fs-4 fw-bold" id="lbl-checkin-today">—</span></div>
          <div><small class="text-muted">เวลาออก</small><br><span class="fs-4 fw-bold" id="lbl-checkout-today">—</span></div>
        </div>
      </div>

      <!-- สรุปโควต้า -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card h-100 text-center">
            <div class="card-body">
              <div class="text-muted small">ลาพักร้อน</div>
              <div class="fs-3 fw-bold text-primary" id="lbl-annual-quota">—</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card h-100 text-center">
            <div class="card-body">
              <div class="text-muted small">ลาป่วย</div>
              <div class="fs-3 fw-bold text-danger" id="lbl-sick-quota">—</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card h-100 text-center">
            <div class="card-body">
              <div class="text-muted small">ลากิจ</div>
              <div class="fs-3 fw-bold text-warning" id="lbl-personal-quota">—</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card h-100 text-center">
            <div class="card-body">
              <div class="text-muted small">💰 Time Bank</div>
              <div class="fs-5 fw-bold text-success" id="lbl-timebank">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- สรุปเดือนนี้ -->
      <div class="card">
        <div class="card-header fw-bold">📅 เดือนนี้</div>
        <div class="card-body d-flex gap-5 flex-wrap">
          <div><small class="text-muted">วันที่ทำงาน</small><br><span class="fs-4 fw-bold" id="lbl-days-worked">—</span></div>
          <div><small class="text-muted">ชั่วโมงรวม</small><br><span class="fs-4 fw-bold" id="lbl-hours-month">—</span></div>
        </div>
      </div>

      <!-- Quick links -->
      <div class="row g-3 mt-2">
        <div class="col-6 col-md-3"><a href="attendance.html" class="btn btn-outline-primary w-100">📋 บันทึกเวลา</a></div>
        <div class="col-6 col-md-3"><a href="leave.html" class="btn btn-outline-success w-100">📅 ขอลา</a></div>
        <div class="col-6 col-md-3"><a href="timebank.html" class="btn btn-outline-warning w-100">💰 Time Bank</a></div>
        <div class="col-6 col-md-3"><a href="reports.html" class="btn btn-outline-info w-100">📊 รายงาน</a></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });
  </script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
