<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>

  <div class="card shadow" style="max-width:380px;width:100%">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="display-4">⏱</div>
        <h4 class="fw-bold">Time Tracker</h4>
        <p class="text-muted small">ระบบบันทึกเวลาและการลา</p>
      </div>

      <div id="alert-box" class="alert d-none"></div>

      <div class="mb-3">
        <label class="form-label fw-semibold">อีเมล</label>
        <input type="email" id="inp-email" class="form-control" placeholder="user@example.com" autocomplete="email">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">รหัสผ่าน</label>
        <input type="password" id="inp-password" class="form-control" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="btn-login" class="btn btn-primary w-100 fw-bold mb-3">เข้าสู่ระบบ</button>
      <div class="text-center">
        <small class="text-muted">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></small>
      </div>
    </div>
  </div>

  <script>
    redirectIfLoggedIn();

    document.getElementById("btn-login").addEventListener("click", async () => {
      const email = document.getElementById("inp-email").value.trim();
      const pass  = document.getElementById("inp-password").value;
      const alert = document.getElementById("alert-box");

      try {
        document.getElementById("btn-login").textContent = "กำลังเข้าสู่ระบบ...";
        await login(email, pass);
        window.location.href = "dashboard.html";
      } catch (err) {
        alert.className = "alert alert-danger";
        alert.textContent = "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
        document.getElementById("btn-login").textContent = "เข้าสู่ระบบ";
      }
    });

    // Enter key
    document.getElementById("inp-password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-login").click();
    });
  </script>
  <script src="assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
