<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่า — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-4">⚙️ ตั้งค่าระบบ</h4>

      <div id="alert-settings" class="alert d-none"></div>

      <div class="row g-4">
        <!-- เวลาทำงาน -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header fw-bold">🕐 เวลาทำงาน</div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label">เวลาเข้า (จันทร์–ศุกร์)</label>
                  <input type="time" id="weekday_start" class="form-control" value="08:00">
                </div>
                <div class="col-6">
                  <label class="form-label">เวลาออก (จันทร์–ศุกร์)</label>
                  <input type="time" id="weekday_end" class="form-control" value="17:00">
                </div>
                <div class="col-6">
                  <label class="form-label">เวลาเข้า (เสาร์ที่ทำงาน)</label>
                  <input type="time" id="saturday_start" class="form-control" value="08:30">
                </div>
                <div class="col-6">
                  <label class="form-label">เวลาออก (เสาร์ที่ทำงาน)</label>
                  <input type="time" id="saturday_end" class="form-control" value="17:30">
                </div>
                <div class="col-6">
                  <label class="form-label">พักกลางวัน (นาที)</label>
                  <input type="number" id="lunch_minutes" class="form-control" value="60" min="0">
                </div>
                <div class="col-6">
                  <label class="form-label">ชั่วโมง/วัน (สำหรับชดเชย)</label>
                  <input type="number" id="hours_per_day" class="form-control" value="8" min="1">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- เสาร์หยุด -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header fw-bold">📅 เสาร์ที่หยุด</div>
            <div class="card-body">
              <p class="text-muted small">เลือกเสาร์ที่กี่ของเดือนที่เป็นวันหยุด</p>
              <div class="d-flex gap-3 flex-wrap">
                <div class="form-check"><input class="form-check-input" type="checkbox" id="sat1" value="1"><label class="form-check-label" for="sat1">เสาร์ที่ 1</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="sat2" value="2"><label class="form-check-label" for="sat2">เสาร์ที่ 2</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="sat3" value="3"><label class="form-check-label" for="sat3">เสาร์ที่ 3</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="sat4" value="4"><label class="form-check-label" for="sat4">เสาร์ที่ 4</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="sat5" value="5"><label class="form-check-label" for="sat5">เสาร์ที่ 5</label></div>
              </div>
            </div>
          </div>

          <!-- โควต้าลา -->
          <div class="card mt-3">
            <div class="card-header fw-bold">🗓 โควต้าวันลา (วัน/ปี)</div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-4">
                  <label class="form-label">ลาพักร้อน</label>
                  <input type="number" id="annual_leave" class="form-control" value="10" min="0">
                </div>
                <div class="col-4">
                  <label class="form-label">ลาป่วย</label>
                  <input type="number" id="sick_leave" class="form-control" value="30" min="0">
                </div>
                <div class="col-4">
                  <label class="form-label">ลากิจ</label>
                  <input type="number" id="personal_leave" class="form-control" value="3" min="0">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button id="btn-save" class="btn btn-primary btn-lg mt-4 px-5 fw-bold">💾 บันทึกการตั้งค่า</button>
    </main>
  </div>

  <div id="toast-msg" class="alert d-none position-fixed bottom-0 end-0 m-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });
  </script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
