<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Bank — Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>

  <div class="d-flex">
    <div id="sidebar-container"></div>

    <main class="flex-grow-1 p-4" style="margin-left:230px">
      <h4 class="fw-bold mb-4">💰 Time Bank — ชั่วโมงชดเชยสะสม</h4>

      <!-- Balance card -->
      <div class="card mb-4 border-success">
        <div class="card-body text-center">
          <div class="text-muted mb-1">ชั่วโมงสะสมคงเหลือ</div>
          <div class="display-4 fw-bold text-success" id="lbl-balance">—</div>
          <div class="text-muted" id="lbl-days">—</div>
        </div>
      </div>

      <div class="row g-4">
        <!-- ใช้ชั่วโมง -->
        <div class="col-md-4">
          <div class="card">
            <div class="card-header fw-bold">ใช้ชั่วโมงสะสม</div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label fw-semibold">จำนวนชั่วโมง</label>
                <input type="number" id="use-hours" class="form-control" min="0.5" step="0.5" placeholder="เช่น 8">
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">หมายเหตุ</label>
                <input type="text" id="use-note" class="form-control" placeholder="ระบุเหตุผล...">
              </div>
              <button id="btn-use" class="btn btn-warning fw-bold w-100">💸 ใช้ชั่วโมง</button>
            </div>
          </div>
        </div>

        <!-- ประวัติ -->
        <div class="col-md-8">
          <div class="card">
            <div class="card-header fw-bold">ประวัติการสะสม / ใช้</div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                  <thead class="table-dark">
                    <tr><th>วันที่</th><th>รายการ</th><th>ชั่วโมง</th></tr>
                  </thead>
                  <tbody id="timebank-table-body">
                    <tr><td colspan="3" class="text-center">กำลังโหลด...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-msg" class="alert d-none position-fixed bottom-0 end-0 m-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch("components/sidebar.html").then(r=>r.text()).then(h=>{
      document.getElementById("sidebar-container").innerHTML=h;
    });
  </script>
  <script src="assets/js/timebank.js"></script>
</body>
</html>
